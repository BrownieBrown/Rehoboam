name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Code quality checks
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install lint tools
        run: uv pip install --system "black>=25.1,<26" ruff bandit[toml]

      - name: Check code formatting with Black
        run: black --check --line-length=100 rehoboam/

      - name: Lint with Ruff
        run: ruff check rehoboam/

      - name: Security check with Bandit
        run: bandit -r rehoboam/ -c pyproject.toml
        continue-on-error: true  # Don't fail build on security warnings

  # Run tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests with pytest
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -v --tb=short
        env:
          # Prevent tests from accidentally using real credentials
          KICKBASE_EMAIL: test@example.com
          KICKBASE_PASSWORD: test_password

  # Type checking (optional but recommended)
  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Type check with mypy
        run: uv run mypy rehoboam/ --ignore-missing-imports
        continue-on-error: true  # Don't fail build on type errors initially

  # Verify deploy/azure_function/requirements.txt matches uv.lock
  deploy-deps-sync:
    name: Verify Azure deploy deps in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Regenerate deploy requirements.txt
        run: bash scripts/sync-azure-deps.sh

      - name: Fail if requirements.txt drifted from uv.lock
        run: |
          if ! git diff --exit-code deploy/azure_function/requirements.txt; then
            echo "::error::deploy/azure_function/requirements.txt is stale. Run scripts/sync-azure-deps.sh and commit the result."
            exit 1
          fi

  # Dependency security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install safety
        run: uv pip install --system safety

      - name: Check dependencies for vulnerabilities
        run: uv export --no-hashes --no-dev | safety check --stdin
        continue-on-error: true  # Don't fail build on vulnerabilities

  # Build package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Deploy to Azure Functions (only on push to main, after tests pass)
  deploy:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: [lint, test, deploy-deps-sync]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment package
        run: |
          mkdir -p deploy_package
          cp deploy/azure_function/function_app.py deploy_package/
          cp deploy/azure_function/host.json deploy_package/
          cp deploy/azure_function/requirements.txt deploy_package/
          cp -r rehoboam/ deploy_package/
          cp pyproject.toml deploy_package/
          cp README.md deploy_package/

      - name: Install Python dependencies in Azure Functions runtime container
        # Build deps inside the official Azure Functions Python image so the
        # resulting binaries (esp. cryptography/_rust.abi3.so) match the glibc
        # version of Azure's Linux Consumption runtime.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/deploy_package:/pkg" \
            mcr.microsoft.com/azure-functions/python:4-python3.11 \
            bash -c "pip install --target=/pkg/.python_packages/lib/site-packages -r /pkg/requirements.txt"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: func-rehoboam
          package: deploy_package
          scm-do-build-during-deployment: true
